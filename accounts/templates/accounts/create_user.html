{% extends 'accounts/base.html' %}

{% block title %}Νέος Χρήστης{% endblock %}

{% block content %}
<div class="create-user-container">
    <h2 style="text-align: center; margin-bottom: 2rem;">Δημιουργία Νέου Χρήστη</h2>
    <form method="post" class="create-user-form">
        {% csrf_token %}
        {% for field in form %}
        <div class="form-group">
            {{ field.label_tag }}
            {{ field }}
            {% if field.errors %}
                <div class="error-message">{{ field.errors|striptags }}</div>
            {% endif %}
        </div>
        {% endfor %}
        <button type="submit">Δημιουργία</button>
    </form>
</div>

<style>
.create-user-container {
    background-color: var(--card-bg, #fff);
    padding: 2rem;
    border-radius: 8px;
    box-shadow: 0 2px 4px var(--shadow, rgba(0,0,0,0.1));
    width: 100%;
    max-width: 400px;
    margin: 2rem auto;
}
.create-user-form {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}
.form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
}
label {
    font-weight: bold;
    color: var(--text-primary, #333);
}
input {
    padding: 0.75rem;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 1rem;
}
button[type="submit"] {
    background-color: var(--accent, #007bff);
    color: white;
    padding: 0.75rem;
    border: none;
    border-radius: 4px;
    font-size: 1rem;
    cursor: pointer;
    transition: background-color 0.2s;
}
button[type="submit"]:hover {
    background-color: var(--accent-hover, #0056b3);
}
.error-message {
    color: #dc3545;
    margin-bottom: 0.5rem;
    font-size: 0.95rem;
}
</style>
{% endblock %}
