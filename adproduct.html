<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <title>Admin | Νέο Προϊόν</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #e2e8f0; }
        .sidebar-link { display: flex; align-items: center; padding: 0.75rem 1rem; color: #94a3b8; border-radius: 0.5rem; transition: all 0.2s; cursor: pointer; }
        .sidebar-link:hover, .sidebar-link.active { background-color: #1e293b; color: #fff; }
        /* Custom Input Styling */
        .input-field {
            width: 100%;
            background-color: #1e293b; /* slate-800 */
            border: 1px solid #475569; /* slate-600 */
            color: white;
            padding: 0.75rem 1rem;
            border-radius: 0.5rem;
            outline: none;
            transition: all 0.2s;
        }
        .input-field:focus {
            border-color: #3b82f6; /* blue-500 */
            box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2);
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: #cbd5e1; /* slate-300 */
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar (Αντίγραφο από admin.html για συνοχή) -->
    <aside class="w-64 bg-slate-900 border-r border-slate-800 flex flex-col hidden md:flex">
        <div class="h-16 flex items-center px-6 border-b border-slate-800">
            <span class="text-xl font-bold text-white">Soft<span class="text-blue-500">Admin</span></span>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="admin.html" class="sidebar-link">
                <span class="mr-3">📊</span> Dashboard
            </a>
            <a href="#" class="sidebar-link active">
                <span class="mr-3">📦</span> Προϊόντα
            </a>
            <a href="#" class="sidebar-link">
                <span class="mr-3">🛒</span> Παραγγελίες
            </a>
            <a href="#" class="sidebar-link">
                <span class="mr-3">⚙️</span> Ρυθμίσεις
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-y-auto">
        <!-- Header -->
        <header class="h-16 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-8">
            <h2 class="text-lg font-semibold text-white">Καταχώρηση Νέου Προϊόντος</h2>
            <div class="flex gap-4">
                <button onclick="window.location.href='admin.html'" class="text-slate-400 hover:text-white px-4 py-2 text-sm">Ακύρωση</button>
                <button class="bg-blue-600 hover:bg-blue-700 text-white text-sm px-6 py-2 rounded-lg font-bold shadow-lg shadow-blue-900/20">Αποθήκευση</button>
            </div>
        </header>

        <div class="p-8 max-w-5xl mx-auto w-full">
            
            <form class="space-y-8">
                
                <!-- Βασικές Πληροφορίες -->
                <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
                    <h3 class="text-lg font-bold text-white mb-6 flex items-center">
                        <span class="bg-blue-900 text-blue-300 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">1</span>
                        Γενικά Στοιχεία
                    </h3>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <!-- Κωδικός Προϊόντος (SKU) -->
                        <div>
                            <label>Κωδικός Προϊόντος (SKU)</label>
                            <input type="text" class="input-field" placeholder="π.χ. SOFT-001">
                        </div>
                        
                        <!-- Barcode / QR -->
                        <div>
                            <label>QR Code / Barcode</label>
                            <div class="relative">
                                <input type="text" class="input-field pl-10" placeholder="Σάρωση ή πληκτρολόγηση">
                                <span class="absolute left-3 top-3.5 text-slate-500">📷</span>
                            </div>
                        </div>
                    </div>

                    <!-- Όνομα Προϊόντος -->
                    <div class="mb-6">
                        <label>Όνομα Προϊόντος</label>
                        <input type="text" class="input-field" placeholder="π.χ. SpeedBoost Pro v2.0">
                    </div>

                    <!-- Περιγραφή -->
                    <div>
                        <label>Περιγραφή</label>
                        <textarea rows="5" class="input-field" placeholder="Γράψε τις λεπτομέρειες του λογισμικού..."></textarea>
                    </div>
                </div>

                <!-- Τιμολόγηση & Απόθεμα -->
                <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
                    <h3 class="text-lg font-bold text-white mb-6 flex items-center">
                        <span class="bg-blue-900 text-blue-300 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">2</span>
                        Τιμή & Διαθεσιμότητα
                    </h3>

                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <!-- Τιμή -->
                        <div>
                            <label>Τιμή Λιανικής (€)</label>
                            <input type="number" step="0.01" class="input-field font-bold text-green-400" placeholder="0.00">
                        </div>

                        <!-- Τιμή Προσφοράς -->
                        <div>
                            <label>Τιμή Προσφοράς (Προαιρετικό)</label>
                            <input type="number" step="0.01" class="input-field" placeholder="0.00">
                        </div>

                        <!-- Ποσότητα -->
                        <div>
                            <label>Ποσότητα (Licenses)</label>
                            <input type="number" class="input-field" placeholder="π.χ. 100">
                            <p class="text-xs text-slate-500 mt-1">Άσε κενό για απεριόριστο (Digital Download)</p>
                        </div>
                    </div>
                </div>

                <!-- Media / Εικόνα -->
                <div class="bg-slate-900 border border-slate-700 rounded-xl p-6">
                    <h3 class="text-lg font-bold text-white mb-6 flex items-center">
                        <span class="bg-blue-900 text-blue-300 w-8 h-8 rounded-full flex items-center justify-center text-sm mr-3">3</span>
                        Πολυμέσα
                    </h3>

                    <div class="border-2 border-dashed border-slate-700 rounded-xl p-10 text-center hover:bg-slate-800/50 transition cursor-pointer">
                        <div class="text-4xl mb-3">📁</div>
                        <p class="text-slate-300 font-medium">Σύρε και άφησε την εικόνα εδώ</p>
                        <p class="text-xs text-slate-500 mt-2">ή κάνε κλικ για αναζήτηση αρχείου</p>
                    </div>
                </div>

                <!-- Submit Button Area (Bottom) -->
                <div class="flex justify-end pt-4 pb-10">
                    <button type="button" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-lg shadow-blue-500/30 transition transform hover:-translate-y-1">
                        💾 Αποθήκευση Προϊόντος
                    </button>
                </div>

            </form>
        </div>
    </main>

</body>
</html>
